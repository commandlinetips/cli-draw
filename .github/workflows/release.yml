name: cli-draw

on:
  push:
    branches: ["main"]
    tags: ["v*"]

  pull_request:
    branches: ["main"]

jobs:
    build:
        runs-on: "ubuntu-latest"

        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v6
              with:
                version: "0.11.14"
            
            - name: Set up python
              run: uv python install
            
            - name: sync dependencies
              run: uv sync
            
            - name: make dist dir
              run: mkdir -p dist
            
            - name: build the tool
              run: uv build --out-dir dist
            
            - name: Create GitHub Release
              uses: softprops/action-gh-release@v2
              with:
                files: dist/*